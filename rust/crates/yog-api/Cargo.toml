[package]
name = "yog-api"
version.workspace = true
edition.workspace = true
# Permissive ON PURPOSE: mods link this crate, so AGPL here would force every
# mod to be AGPL and kill the ecosystem. The protected part is the runtime/host.
license = "MIT OR Apache-2.0"
description = "Yog — ergonomic Rust API for writing Minecraft mods (facade)."

[dependencies]
yog-abi  = { path = "../yog-abi" }
yog-core = { path = "../yog-core" }
yog-event = { path = "../yog-event" }
yog-world = { path = "../yog-world" }
yog-entity = { path = "../yog-entity" }
yog-player = { path = "../yog-player" }
yog-registry = { path = "../yog-registry" }
yog-network = { path = "../yog-network" }
yog-command = { path = "../yog-command" }
yog-logging = { path = "../yog-logging" }
yog-storage = { path = "../yog-storage" }
yog-config  = { path = "../yog-config" }
