[package]
name = "yog-api"
version = "0.12.0"
edition.workspace = true
authors.workspace = true
# Permissive ON PURPOSE: mods link this crate, so AGPL here would force every
# mod to be AGPL and kill the ecosystem. The protected part is the runtime/host.
license = "MIT OR Apache-2.0"
description = "Yog — ergonomic Rust API for writing Minecraft mods (facade)."

[dependencies]
yog-abi  = "0.5"
yog-core = "0.1"
yog-event = "0.1"
yog-world = "0.1"
yog-entity = "0.1"
yog-player = "0.1"
yog-registry = "0.7"
yog-network = "0.1"
yog-command = "0.1"
yog-logging = "0.1"
yog-storage = "0.1"
yog-config  = "0.1"
yog-gfx     = "0.4"
yog-ui      = "0.5"
yog-book = "0.10"
