[mod]
id          = "example-mod"
name        = "Example Mod"
version     = "0.1.0"
description = "Official Yog example mod — demonstrates the full API."
authors     = ["Yog Contributors"]
license     = "MIT OR Apache-2.0"

# Points yog-api at the local monorepo crate.
# Real third-party mods omit this and get yog-api from crates.io.
[dev]
yog_api_path = "../rust/crates/yog-api"
